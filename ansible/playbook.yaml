- name: Deploy to Kubernetes
  hosts: localhost
  gather_facts: false

  environment:
    KUBECONFIG: /var/jenkins_home/.kube/config

  tasks:
    - name: Verify cluster access
      shell: kubectl get nodes

    - name: Apply deployment
      shell: kubectl apply -f {{ playbook_dir }}/../deployment.yaml --validate=false

    - name: Apply service
      shell: kubectl apply -f {{ playbook_dir }}/../service.yaml --validate=false
