- name: Deploy to Kubernetes
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Apply deployment
      shell: |
        export KUBECONFIG={{ lookup('env','KUBECONFIG') }}
        kubectl apply -f ../deployment.yaml --validate=false

    - name: Apply service
      shell: |
        export KUBECONFIG={{ lookup('env','KUBECONFIG') }}
        kubectl apply -f {{ playbook_dir }}/../service.yaml --validate=false
